---
name: "rook-overwatch"
arch: "arm64"
platform: "linux"
version: "${VERSION}"
section: "base"
priority: "optional"
depends: []
maintainer: "Enno Welbers <enno@rook.computer>"
description: |
  Overwatch is a small tool we use in RooK to implement the on-device Keys.
  It monitors the three GPIO Pins for a low signal (including debouncing) and executes a program upon pressing them.
homepage: "https://github.com/RooK-Computer/Overwatch"
license: "GPL-2.0-or-later"

overrides:
  deb:
    scripts:
      postinstall: ./contrib/postinstall.sh

contents:
  - src: contrib/etc
    dst: /etc/overwatch
    type: tree
    packager: deb # RetroPI

  - src: dist/overwatch
    dst: /usr/local/bin/overwatch
    file_info:
      mode: 0755
    packager: deb # RetroPI

  - src: contrib/opt
    dst: /opt
    type: tree
    packager: deb # RetroPI

  - src: contrib/rook-overwatch.service
    dst: /usr/lib/systemd/system/rook-overwatch.service
    file_info:
      mode: 0644
    packager: deb # RetroPI

  - src: contrib/etc
    dst: /etc/userdata/system/overwatch.d/
    type: tree
    packager: archlinux # Batocera

  - src: dist/overwatch
    dst: /etc/userdata/system/overwatch.d/overwatch
    file_info:
      mode: 0755
    packager: archlinux # Batocera

  - src: contrib/overwatch.sh
    dst: /userdata/system/services/overwatch
    file_info:
      mode: 0755
    packager: archlinux # Batocera
